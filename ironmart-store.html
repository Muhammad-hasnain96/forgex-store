<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForgeX — Pro Grade Hardware</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --paper:#fafafa;
    --paper-dim:#f5f5f5;
    --steel:#3a3a3a;

  *{box-sizing:border-box;}
  body{

  .stock-badge.low{background:#ffe0e0;color:#c33;}

  .search-filter{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;align-items:center;background:white;padding:20px;border-radius:10px;box-shadow:var(--shadow);}

  .search-filter select{flex:0 1 180px;margin-bottom:0;}
  .wishlist-btn{

  .footer-col p,.footer-col a{

  .stock-badge{font-size:12px;padding:6px 12px;border-radius:8px;font-weight:700;display:inline-block;}
  .stock-badge.low{background:#ffe0e0;color:#c33;}

  .toast{

  .toast.success{background:#d4edda;border:1px solid #28a745;color:#155724;}

  .admin-product-info{flex:1;}

  .admin-product-meta{font-size:12px;color:#888;}
  .admin-actions{display:flex;gap:8px;}
  .btn.small-admin{padding:6px 12px;font-size:11px;}
  .admin-login{max-width:320px;margin:80px auto;background:white;padding:40px;border-radius:12px;box-shadow:var(--shadow-lg);}
  .admin-login h2{text-align:center;margin-bottom:24px;}
  .admin-login input{margin-bottom:16px;}
  .admin-login .btn{width:100%;margin-top:12px;}
  .demo-hint{text-align:center;font-size:12px;color:#666;margin-top:16px;padding:12px;background:var(--paper-dim);border-radius:6px;}

  .product-modal{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;

  }
  .product-modal.show{display:flex;}
  .product-modal-content{
    background:white;border-radius:12px;max-width:640px;width:90%;max-height:90vh;
    overflow-y:auto;padding:32px;position:relative;box-shadow:var(--shadow-lg);

  .product-modal-close{

</style>

<body>
<div id="app"></div>

<script src="products.js"></script>
<script>
const SELLER = {email:'seller@ironmart.com', password:'seller123'};

let state = {
  view:'products',
  authMode:'login',
  user:null,
  isSeller:false,
  isAdmin:false,
  cart:[],
  orders:[],
  toast:null,
  checkoutAddress:{name:'',phone:'',address:'',city:''},
  payMethod:'cod',
  lastOrderId:null,
  wishlist:[],
  searchQuery:'',
  selectedCategory:'all',
  selectedProduct:null,
  toastType:'success', // 'success', 'error', 'info'
  allProducts:[],
  editingProduct:null,
};

async function safeGet(key, shared){
  try{ 
    // Try custom storage API first, then fallback to localStorage
    if(window.storage && window.storage.get) { 
      const r = await window.storage.get(key, shared); 
      return r ? JSON.parse(r.value) : null; 
    }
    // Fallback to localStorage
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : null;
  }
  catch(e){ console.error('storage get error:', e); return null; }
}
async function safeSet(key, value, shared){
  try{ 
    // Try custom storage API first, then fallback to localStorage
    if(window.storage && window.storage.set) { 
      await window.storage.set(key, JSON.stringify(value), shared); 
    } else {
      // Fallback to localStorage
      localStorage.setItem(key, JSON.stringify(value));
    }
  }
  catch(e){ console.error('storage set failed:', e); }
}

async function getUsers(){ return (await safeGet('users', true)) || {}; }
async function saveUsers(u){ await safeSet('users', u, true); }
async function getOrders(){ return (await safeGet('orders', true)) || []; }
async function saveOrders(o){ await safeSet('orders', o, true); state.orders = o; }
async function getCart(email){ return (await safeGet('cart:'+email, true)) || []; }
async function saveCart(email, cart){ await safeSet('cart:'+email, cart, true); state.cart = cart; }
async function getProducts(){ return (await safeGet('products', true)) || PRODUCTS; }
async function saveProducts(p){ await safeSet('products', p, true); }
async function loadProducts(){
  const saved = (await safeGet('products', true)) || [];
  const seedIds = new Set(PRODUCTS.map(p => p.id));
  // Always use latest catalog from products.js for seed IDs (p1–p60)
  const custom = saved.filter(p => !seedIds.has(p.id));
  const merged = [...PRODUCTS, ...custom];
  await saveProducts(merged);
  return merged;
}

function fmt(n){ return 'Rs. ' + n.toLocaleString('en-PK'); }

function isImageUrl(v){
  v = (v || '').trim();
  if(!v) return false;
  if(/^https?:\/\//i.test(v)) return true;
  if(v.startsWith('//')) return true;
  if(/^www\./i.test(v)) return true;
  return /\.(jpg|jpeg|png|gif|webp|svg|avif)(\?.*)?$/i.test(v);
}
function imageSrc(v){
  v = (v || '').trim();
  if(/^https?:\/\//i.test(v)) return v;
  if(v.startsWith('//')) return 'https:' + v;
  if(/^www\./i.test(v) || isImageUrl(v)) return 'https://' + v.replace(/^\/+/, '');
  return v;
}
function productImageHtml(p, className, style){
  if(isImageUrl(p.image)){
    return `<img src="${imageSrc(p.image)}" class="${className||'product-image'}" style="${style||''}" onerror="this.onerror=null;this.outerHTML='<div class=\\'product-image\\'>📦</div>'" alt="${p.name}">`;
  }
  return `<div class="${className||'product-image'}">${p.image}</div>`;
}

function validateEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
function validatePhone(p){ return /^(\+92|0)[0-9]{10}$/.test(p.replace(/[-\s]/g,'')); }
function validateName(n){ return n.trim().length >= 2; }
function validatePassword(p){ return p.length >= 6; }

function showToast(msg, type='success'){
  state.toast = msg;
  state.toastType = type;
  render();
  setTimeout(()=>{ state.toast=null; render(); }, 4000);
}
function cartTotal(){
  return state.cart.reduce((sum,item)=>{
    const p = state.allProducts.find(x=>x.id===item.id);
    return sum + (p ? p.price*item.qty : 0);
  },0);
}
function cartCount(){ return state.cart.reduce((s,i)=>s+i.qty,0); }

function setView(v){ state.view = v; state.selectedProduct = null; render(); }

function getCategories(){
  const cats = [...new Set(PRODUCTS.map(p=>p.cat))];
  return ['all', ...cats.sort()];
}

function getFilteredProducts(){
  let filtered = state.allProducts;
  if(state.selectedCategory !== 'all'){
    filtered = filtered.filter(p=>p.cat === state.selectedCategory);
  }
  if(state.searchQuery.trim()){
    const q = state.searchQuery.toLowerCase();
    filtered = filtered.filter(p=>p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
  }
  return filtered;
}

function starRating(rating){
  const full = Math.floor(rating);
  const half = rating % 1 !== 0;
  let html = '';
  for(let i=0;i<5;i++){
    if(i<full) html += '<span class="star">★</span>';
    else if(i===full && half) html += '<span class="star">⯨</span>';
    else html += '<span style="color:#ddd;">★</span>';
  }
  return html;
}

function getStockBadge(stock){
  if(stock <= 5) return `<span class="stock-badge low">Low stock (${stock})</span>`;
  if(stock <= 20) return `<span class="stock-badge medium">${stock} left</span>`;
  return `<span class="stock-badge high">In stock</span>`;
}

// Admin Functions
const ADMIN_PASS = 'admin123';
function loginAdmin(){
  const pass = document.getElementById('admin-pass').value;
  if(pass === ADMIN_PASS){
    state.isAdmin = true;
    showToast('Admin mode activated!', 'success');
    setView('admin');
  } else {
    showToast('Incorrect admin password.', 'error');
  }
}

function logoutAdmin(){
  state.isAdmin = false;
  setView('products');
}

async function addProduct(){
  const name = document.getElementById('ap-name').value.trim();
  const price = parseInt(document.getElementById('ap-price').value);
  const cat = document.getElementById('ap-cat').value;
  const stock = parseInt(document.getElementById('ap-stock').value);
  const rating = parseFloat(document.getElementById('ap-rating').value);
  const reviews = parseInt(document.getElementById('ap-reviews').value);
  const desc = document.getElementById('ap-desc').value.trim();
  const image = document.getElementById('ap-image').value.trim();
  
  if(!name || !price || !cat || !stock || !rating || !reviews || !desc || !image){
    showToast('Please fill all fields.', 'error');
    return;
  }
  
  const newId = 'p' + (Math.max(...state.allProducts.map(p=>parseInt(p.id.slice(1)))) + 1);
  const newProduct = {id:newId, name, price, cat, stock, rating, reviews, desc, image};
  
  state.allProducts.push(newProduct);
  await saveProducts(state.allProducts);
  
  // Clear form
  document.getElementById('ap-name').value = '';
  document.getElementById('ap-price').value = '';
  document.getElementById('ap-stock').value = '';
  document.getElementById('ap-rating').value = '4.5';
  document.getElementById('ap-reviews').value = '';
  document.getElementById('ap-desc').value = '';
  document.getElementById('ap-image').value = '';
  
  showToast(`Product "${name}" added successfully!`, 'success');
  render();
}

async function deleteProduct(id){
  if(!confirm('Delete this product?')) return;
  state.allProducts = state.allProducts.filter(p=>p.id !== id);
  await saveProducts(state.allProducts);
  showToast('Product deleted.', 'success');
  render();
}

function editProduct(id){
  const product = state.allProducts.find(p=>p.id === id);
  if(product){
    document.getElementById('ap-name').value = product.name;
    document.getElementById('ap-price').value = product.price;
    document.getElementById('ap-cat').value = product.cat;
    document.getElementById('ap-stock').value = product.stock;
    document.getElementById('ap-rating').value = product.rating;
    document.getElementById('ap-reviews').value = product.reviews;
    document.getElementById('ap-desc').value = product.desc;
    document.getElementById('ap-image').value = product.image;
    state.editingProduct = id;
    document.getElementById('ap-submit').textContent = 'Update Product';
    document.getElementById('ap-submit').onclick = ()=>updateProduct(id);
  }
}

async function updateProduct(id){
  const name = document.getElementById('ap-name').value.trim();
  const price = parseInt(document.getElementById('ap-price').value);
  const cat = document.getElementById('ap-cat').value;
  const stock = parseInt(document.getElementById('ap-stock').value);
  const rating = parseFloat(document.getElementById('ap-rating').value);
  const reviews = parseInt(document.getElementById('ap-reviews').value);
  const desc = document.getElementById('ap-desc').value.trim();
  const image = document.getElementById('ap-image').value.trim();
  
  const idx = state.allProducts.findIndex(p=>p.id === id);
  if(idx >= 0){
    state.allProducts[idx] = {id, name, price, cat, stock, rating, reviews, desc, image};
    await saveProducts(state.allProducts);
    
    document.getElementById('ap-name').value = '';
    document.getElementById('ap-price').value = '';
    document.getElementById('ap-stock').value = '';
    document.getElementById('ap-rating').value = '4.5';
    document.getElementById('ap-reviews').value = '';
    document.getElementById('ap-desc').value = '';
    document.getElementById('ap-image').value = '';
    document.getElementById('ap-submit').textContent = 'Add Product';
    document.getElementById('ap-submit').onclick = addProduct;
    state.editingProduct = null;
    
    showToast(`Product updated!`, 'success');
    render();
  }
}

async function addToCart(id){
  if(!state.user){ showToast('Log in to add items to your cart.', 'error'); setView('auth'); return; }
  const product = state.allProducts.find(p=>p.id===id);
  if(!product){ showToast('Product not found.', 'error'); return; }
  const existing = state.cart.find(i=>i.id===id);
  let cart;
  if(existing){ cart = state.cart.map(i=>i.id===id?{...i,qty:i.qty+1}:i); }
  else{ cart = [...state.cart, {id,qty:1}]; }
  await saveCart(state.user.email, cart);
  showToast(`${product.name} added to cart.`, 'success');
}

function toggleWishlist(id){
  if(state.wishlist.includes(id)){
    state.wishlist = state.wishlist.filter(w=>w!==id);
  } else {
    state.wishlist = [...state.wishlist, id];
  }
  render();
}

async function changeQty(id, delta){
  let cart = state.cart.map(i=>i.id===id?{...i,qty:i.qty+delta}:i).filter(i=>i.qty>0);
  await saveCart(state.user.email, cart);
  render();
}

async function placeOrder(){
  const order = {
    id: 'ORD-' + Date.now().toString().slice(-6),
    customerEmail: state.user.email,
    customerName: state.checkoutAddress.name,
    items: state.cart.map(i=>{
      const p = state.allProducts.find(x=>x.id===i.id);
      return {name:p.name, qty:i.qty, price:p.price};
    }),
    total: cartTotal(),
    address: state.checkoutAddress,
    payMethod: state.payMethod,
    status: 'placed',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  const orders = await getOrders();
  orders.push(order);
  await saveOrders(orders);
  await saveCart(state.user.email, []);
  state.lastOrderId = order.id;
  state.checkoutAddress = {name:'',phone:'',address:'',city:''};
  state.payMethod = 'cod';
  setView('confirmation');
}

function statusStage(status){
  const stages = ['placed','shipped','delivered'];
  const idx = stages.indexOf(status);
  const icons = {placed:'&#128203;', shipped:'&#128666;', delivered:'&#127968;'};
  const labels = {placed:'Order placed', shipped:'Shipped', delivered:'Delivered'};
  return `
  <div class="ticket">
    ${stages.map((s,i)=>`
      <div class="stage">
        <div class="stamp ${i<idx?'done':i===idx?'current':''}">${i<=idx?icons[s]:''}</div>
        <div class="stage-label">${labels[s]}</div>
      </div>
    `).join('')}
  </div>`;
}

      >
      <div style="display:flex;gap:8px;">
        <button id="ap-submit" class="btn orange" style="flex:1;" onclick="addProduct()">Add Product</button>
        ${state.editingProduct ? `<button class="btn outline" style="flex:1;" onclick="cancelEdit()">Cancel</button>` : ''}
      </div>
    </div>
    <div class="admin-products">
      <h3 style="margin-bottom:16px;">Products (${state.allProducts.length})</h3>
      <div style="max-height:500px;overflow-y:auto;">
        ${state.allProducts.length === 0 ? `
          <div class="empty" style="padding:40px 20px;text-align:center;">No products yet.</div>
        ` : `
          ${state.allProducts.map(p=>`
            <div class="admin-product-row">
              <div class="admin-product-info">
                <div class="admin-product-name">${isImageUrl(p.image) ? `<img src="${imageSrc(p.image)}" style="width:24px;height:24px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:6px;">` : `<span>${p.image}</span>`} ${p.name}</div>
                <div class="admin-product-meta">Rs. ${fmt(p.price)} | ${p.cat} | Stock: ${p.stock}</div>
              </div>
              <div class="admin-actions">
                <button class="btn small small-admin" onclick="editProduct('${p.id}')">Edit</button>
                <button class="btn small small-admin" style="background:#c33;border-color:#c33;" onclick="deleteProduct('${p.id}')">Delete</button>
              </div>
            </div>
          `).join('')}
        `}
      </div>
    </div>
  </div>`;
}

async function signup(){
  const name = document.getElementById('a-name').value.trim();
  const email = document.getElementById('a-email').value.trim().toLowerCase();
  const pass = document.getElementById('a-pass').value;
  
  if(!validateName(name)){ showToast('Name must be at least 2 characters.', 'error'); return; }
  if(!validateEmail(email)){ showToast('Please enter a valid email address.', 'error'); return; }
  if(!validatePassword(pass)){ showToast('Password must be at least 6 characters.', 'error'); return; }
  
  const users = await getUsers();
  if(users[email]){ showToast('An account with this email already exists.', 'error'); return; }
  
  users[email] = {name, email, password:pass};
  await saveUsers(users);
  state.user = {name, email};
  state.cart = await getCart(email);
  state.orders = await getOrders();
  showToast(`Welcome, ${name}!`, 'success');
  setView('products');
}

async function login(){
  const email = document.getElementById('a-email').value.trim().toLowerCase();
  const pass = document.getElementById('a-pass').value;
  
  if(!validateEmail(email)){ showToast('Please enter a valid email address.', 'error'); return; }
  if(!pass){ showToast('Please enter your password.', 'error'); return; }
  
  const users = await getUsers();
  const u = users[email];
  if(!u || u.password!==pass){ showToast('Incorrect email or password.', 'error'); return; }
  
  state.user = {name:u.name, email:u.email};
  state.cart = await getCart(email);
  state.orders = await getOrders();
  showToast(`Welcome back, ${u.name}!`, 'success');
  setView('products');
}

function logout(){
  state.user = null;
  state.isSeller = false;
  state.cart = [];
  state.searchQuery = '';
  state.selectedCategory = 'all';
  state.selectedProduct = null;
  setView('products');
}

function render(){
  let body;
  if(state.isAdmin && state.view==='admin') body = adminPanelView();
  else if(state.view==='adminlogin') body = adminLoginView();
  else if(state.view==='sellerlogin') body = sellerLoginView();
  else if(state.isSeller && state.view==='sellerdash') body = sellerDashView();
  else if(state.view==='auth') body = authView();
  else if(state.view==='cart') body = cartView();
  else if(state.view==='checkout') body = checkoutView();
  else if(state.view==='payment') body = paymentView();
  else if(state.view==='confirmation') body = confirmationView();
  else if(state.view==='myorders') body = myOrdersView();
  else body = productsView();

  document.getElementById('app').innerHTML = `
    ${header()}
    <main>${body}</main>
    ${productDetailModal()}
    ${roleFooter()}
    ${footer()}
  `;
  state.toast = null;
}

    users['demo@example.com'] = {name:'Demo User', email:'demo@example.com', password:'demo123'};
    await saveUsers(users);
  }
  state.orders = await getOrders();
  state.allProducts = await loadProducts();
  render();
})();
